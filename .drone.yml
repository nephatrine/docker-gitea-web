---
kind: pipeline
type: exec
name: default

platform:
  os: linux
  arch: amd64

steps:
- name: build
  commands:
  - docker build --pull -t pdr.nephatrine.net/nephatrine/gitea-web:testing .
  - HOME=/mnt/config/home docker push pdr.nephatrine.net/nephatrine/gitea-web:testing
  - docker tag pdr.nephatrine.net/nephatrine/gitea-web:testing nephatrine/gitea-web:testing
  - HOME=/mnt/config/home docker push nephatrine/gitea-web:testing
  - docker rmi pdr.nephatrine.net/nephatrine/gitea-web:testing

---
kind: pipeline
name: after

steps:
- name: notify
  image: appleboy/drone-discord
  settings:
    avatar_url: https://files.nephatrine.net/Images/Buttons/Drone.png
    message: "Automated build of **{{repo.name}}:{{commit.branch}}** has returned [{{build.status}}]({{build.link}})."
    username: DroneCI
    webhook_id:
      from_secret: wh-infra-id
    webhook_token:
      from_secret: wh-infra-tok

depends_on:
- default

trigger:
  status:
  - success
  - failure

---
kind: signature
hmac: f81b78f5ae765b726ab18442d115b6838c8b7f554f6886de1b0b705b17284f77

...
